<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Shadower</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#1e293b}.container{max-width:800px;margin:0 auto;padding:16px}.header{padding:16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;margin-bottom:16px;border-radius:8px}.header h1{font-size:24px;margin-bottom:8px}.mode-selector{display:flex;gap:8px;margin-bottom:16px}button{padding:10px 16px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s}.mode-btn{flex:1;background:#e2e8f0;color:#475569}.mode-btn.active{background:#0ea5e9;color:#fff}.theme-box{background:#f1f5f9;padding:16px;border-radius:8px;margin-bottom:16px}.theme-title{font-size:16px;font-weight:600;margin-bottom:12px;color:#64748b}.english-text{font-size:18px;line-height:1.8;font-weight:500;margin-bottom:12px}.japanese-text{font-size:16px;line-height:1.7;color:#475569}.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.control-btn{background:#0ea5e9;color:#fff;padding:10px 12px;font-size:13px;cursor:pointer;border-radius:6px}.control-btn:active{background:#0284c7}.control-btn.secondary{background:#64748b}.control-btn.heart{background:#ec4899;font-size:16px;padding:8px 12px}.control-btn.heart.saved{background:#be185d}.speed-control{display:flex;align-items:center;gap:8px}.speed-control input{width:60px;padding:6px;border:1px solid #cbd5e1;border-radius:4px}.tip-box{padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px}.tip-box.shadowing{background:#dbeafe;color:#0c4a6e}.tip-box.listening{background:#dcfce7;color:#164e2c}.favorites-section{margin-top:24px;padding-top:24px;border-top:2px solid #e2e8f0}.favorites-title{font-size:18px;font-weight:600;margin-bottom:12px}.favorites-list{display:flex;flex-direction:column;gap:8px}.favorite-item{background:#f1f5f9;padding:12px;border-radius:6px;position:relative;cursor:pointer;transition:all 0.2s}.favorite-item:hover{background:#e0e7ff;box-shadow:0 2px 8px rgba(14,165,233,0.1)}.favorite-item .en{font-size:14px;font-weight:500;margin-bottom:4px}.favorite-item .jp{font-size:12px;opacity:.7}.favorite-btn{position:absolute;right:8px;top:8px;background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px}.favorite-btn:hover{opacity:0.6}.favorite-count{font-size:12px;color:#64748b;margin-bottom:8px}.play-btn{background:#0ea5e9;color:#fff;border:none;border-radius:4px;padding:6px 10px;font-size:12px;cursor:pointer;margin-right:8px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎙️ English Shadower</h1><p style="font-size:13px;opacity:.7">農業ビジネス英語をマスターしよう</p></div>
<div class="mode-selector"><button class="mode-btn active" id="shadowBtn" onclick="setMode('shadowing')">🎙️ Shadowing</button><button class="mode-btn" id="listenBtn" onclick="setMode('listening')">👂 Listening</button></div>
<div class="tip-box shadowing" id="tipBox">💡 コツ：音声に続けて同じタイミングで話す練習をしましょう。</div>
<div class="theme-box" id="themeBox">
  <div class="theme-title">農業ビジネス英語</div>
  <div class="english-text" id="englishText">「Generate」をクリックして新しい例文を作成してください。</div>
  <div class="japanese-text" id="japaneseText" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #cbd5e1"></div>
</div>
<div class="controls">
  <button class="control-btn" onclick="generateSentence()">✨ Generate</button>
  <button class="control-btn" onclick="playAudio()">▶️ Play</button>
  <button class="control-btn secondary" onclick="stopAudio()">⏹️ Stop</button>
  <div class="speed-control">
    <label>Speed:</label>
    <input type="number" id="speedInput" value="1" min="0.5" max="2" step="0.25">
  </div>
  <button class="control-btn" id="jpBtn" onclick="toggleTranslation()">🇯🇵 表示</button>
  <button class="control-btn heart" id="heartBtn" onclick="toggleFavorite()">🤍</button>
</div>

<div class="favorites-section" id="favoritesSection" style="display:none">
  <div class="favorites-title">❤️ 保存済み例文</div>
  <div class="favorite-count" id="favoriteCount">0 / 10</div>
  <div class="favorites-list" id="favoritesList"></div>
</div>
</div>

<script>
const shadowingSentences=[
  {en:'We are committed to expanding seed treatment technology across the Japanese market.',jp:'日本市場における種子処理技術の拡大に力を入れています。'},
  {en:'Our company has developed crop protection systems to reduce environmental impact.',jp:'当社は環境への負荷を低減するための病害虫防除システムを開発しました。'},
  {en:'Our latest irrigation solution offers three key advantages: water efficiency, cost savings, and improved sustainability.',jp:'当社の最新灌漑ソリューションには3つの主な利点があります：水の効率利用、コスト削減、および持続可能性の向上です。'},
  {en:'The fertilizer formula is designed to improve crop yields while reducing environmental impact.',jp:'この肥料製品は環境への負荷を減らしながら作物収量を向上させるよう設計されています。'},
  {en:'We have successfully implemented drone monitoring services across Asian markets.',jp:'当社はアジア各地でのドローン監視サービスの導入に成功しました。'},
  {en:'This soil analysis system is compatible with existing farm equipment and requires no modification.',jp:'この土壌分析システムは既存の農機具と互換性があり、改修の必要がありません。'},
  {en:'Our customers have reported yield increases of up to 20% in field trials.',jp:'お客様から圃場試験において収量が最大20%増加したとのご報告をいただいています。'},
  {en:'We believe yield prediction software is an excellent fit for developing regions.',jp:'収量予測ソフトウェアは発展途上地域に最適なソリューションだと確信しています。'},
  {en:'Would you be interested in a trial of our organic agriculture program?',jp:'当社の有機農業プログラムのお試し導入にご関心はおありでしょうか。'},
  {en:'The implementation of climate adaptation strategy will maximize farm profitability.',jp:'気候変動対応戦略の導入により農家の利益を最大化できます。'},
  {en:'We provide comprehensive support for implementing pest management technology.',jp:'病害虫管理技術の導入から運用まで、包括的なサポートを提供します。'},
  {en:'Our research shows that sustainability initiatives can significantly reduce production costs.',jp:'当社の研究によると、持続可能性イニシアティブは生産コストを大幅に削減できます。'},
  {en:'This technology is designed to enhance disease resistance while maintaining compatibility.',jp:'この技術は互換性を保ちながら病害虫耐性を強化するよう設計されています。'},
  {en:'We have successfully established partnerships with leading agricultural organizations.',jp:'当社は主要な農業団体とのパートナーシップの確立に成功しました。'},
  {en:'Our latest product offers improved germination rates and better environmental performance.',jp:'当社の最新製品は発芽率の向上と優れた環境性能を実現します。'}
];

const listeningSentences=[
  {en:'We are committed to expanding seed treatment technology across the Japanese market. Our research team has spent the last three years developing this innovative solution to address the growing challenges faced by farmers in the region. We believe this represents a significant breakthrough in agricultural technology that will benefit farming communities for years to come.',jp:'日本市場における種子処理技術の拡大に力を入れています。当社の研究チームはこの地域の農家が直面する課題に対応するため、この革新的なソリューションの開発に3年間を費やしてきました。これは農業技術における大きな飛躍であり、今後長年にわたり農業コミュニティに利益をもたらすと確信しています。'},
  {en:'Our company has developed crop protection systems to reduce environmental impact. After extensive field testing across multiple regions, we can confidently say that this solution delivers measurable results. Farmers using our technology have seen dramatic improvements in their operations and reported higher satisfaction levels.',jp:'当社は環境への負荷を低減するための病害虫防除システムを開発しました。複数の地域で広範な圃場試験を実施した結果、このソリューションが測定可能な成果をもたらすことが実証されました。当社の技術を導入している農家は経営成績の著しい改善を実感し、高い満足度を報告しています。'},
  {en:'Our latest irrigation solution offers three key advantages: water efficiency, cost savings, and improved sustainability. Additionally, our customer support team is available 24/7 to assist with any questions or concerns. We stand behind every product we sell with a comprehensive warranty and technical support package.',jp:'当社の最新灌漑ソリューションには3つの主な利点があります：水の効率利用、コスト削減、および持続可能性の向上です。さらに、当社のカスタマーサポートチームは24時間体制でご質問やご不明な点についてサポートいたします。すべての製品に対して包括的な保証と技術サポートパッケージをご提供しています。'},
  {en:'The fertilizer formula is designed to improve crop yields while reducing environmental impact. This dual functionality makes it particularly attractive for farms looking to optimize their operations without significant additional investment. The system integrates seamlessly with existing farm management software and equipment.',jp:'この肥料製品は環境への負荷を減らしながら作物収量を向上させるよう設計されています。この二重機能により、大きな追加投資なしに経営を最適化したい農場にとって特に魅力的です。このシステムは既存の農場管理ソフトウェアや機器とシームレスに統合されます。'},
  {en:'We have successfully implemented drone monitoring services across Asian markets. The response from local farmers has been overwhelmingly positive, with many expressing their intention to expand the program to neighboring areas. Government agencies have also shown strong interest in supporting wider adoption of this innovative technology.',jp:'当社はアジア各地でのドローン監視サービスの導入に成功しました。地元の農家からの反応は非常に好意的で、多くの農家が隣接地域へのプログラム拡大を希望しています。政府機関もこの革新的な技術のより広い導入をサポートすることに強い関心を示しています。'},
  {en:'This soil analysis system is compatible with existing farm equipment and requires no modification. Installation typically takes only one or two days, and our technical team will handle all the setup and configuration. Once installed, the system runs automatically with minimal human intervention required.',jp:'この土壌分析システムは既存の農機具と互換性があり、改修の必要がありません。通常、インストールには1～2日を要し、当社の技術チームがすべてのセットアップと設定を実施いたします。インストール後はシステムが自動的に稼働し、人的介入はほとんど必要ありません。'},
  {en:'Our customers have reported yield increases of up to 20% in field trials. These results have been validated by independent agricultural research institutions, lending credibility to our claims. We are proud to share these findings with stakeholders interested in evidence-based decision making.',jp:'お客様から圃場試験において収量が最大20%増加したとのご報告をいただいています。これらの結果は独立した農業研究機関によって検証されており、当社の主張の信頼性が認められています。当社は、根拠に基づいた意思決定に関心をお持ちの関係者とこれらの知見を共有することを誇りとしています。'},
  {en:'We believe yield prediction software is an excellent fit for developing regions. Our team has carefully analyzed the specific conditions, climate patterns, and farming practices unique to each region. We are confident that our tailored approach will deliver exceptional results for your agricultural operations.',jp:'収量予測ソフトウェアは発展途上地域に最適なソリューションだと確信しています。当社チームは各地域に固有の条件、気候パターン、および農業慣行を詳細に分析しました。当社のカスタマイズされたアプローチがお客様の農業経営に優れた成果をもたらすと確信しています。'},
  {en:'Would you be interested in a trial of our organic agriculture program? We offer flexible trial periods ranging from one month to six months, allowing you to evaluate the system in your own environment. There is no obligation to purchase, and you can cancel at any time without penalty.',jp:'当社の有機農業プログラムのお試し導入にご関心はおありでしょうか。1ヶ月から6ヶ月までの柔軟なお試し期間をご用意しており、ご自身の環境でシステムを評価していただけます。購入の義務はなく、いつでも中止できます。'},
  {en:'The implementation of climate adaptation strategy will maximize farm profitability. To ensure success, we provide comprehensive training for your staff, ongoing technical support, and regular follow-up assessments. Our goal is not just to implement a system, but to build a long-term partnership with our clients.',jp:'気候変動対応戦略の導入により農家の利益を最大化できます。成功を確保するため、スタッフへの包括的な研修、継続的な技術サポート、および定期的なフォローアップ評価を提供いたします。当社の目標は単にシステムを導入することではなく、クライアントとの長期的なパートナーシップを構築することです。'}
];

let currentMode='shadowing';
let currentSentence={en:'',jp:''};
let showTranslation=false;
let isPlaying=false;
let favorites=[];

function init(){
  loadVoices();
  favorites=JSON.parse(localStorage.getItem('favorites'))||[];
  updateFavoritesDisplay();
  generateSentence();
}

function loadVoices(){
  if('speechSynthesis'in window){
    window.speechSynthesis.onvoiceschanged=()=>{};
  }
}

function getRandomItem(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function generateSentence(){
  const sentences=currentMode==='shadowing'?shadowingSentences:listeningSentences;
  const sentence=getRandomItem(sentences);
  
  currentSentence={en:sentence.en,jp:sentence.jp};
  document.getElementById('englishText').textContent=sentence.en;
  document.getElementById('japaneseText').textContent=sentence.jp;
  
  updateHeartButton();
  showTranslation=false;
  document.getElementById('jpBtn').textContent='🇯🇵 表示';
  document.getElementById('japaneseText').style.display='none';
}

function setMode(m){
  currentMode=m;
  document.getElementById('shadowBtn').classList.toggle('active',m==='shadowing');
  document.getElementById('listenBtn').classList.toggle('active',m==='listening');
  const t=document.getElementById('tipBox');
  if(m==='shadowing'){
    t.className='tip-box shadowing';
    t.textContent='💡 コツ：音声に続けて同じタイミングで話す練習をしましょう。';
  }else{
    t.className='tip-box listening';
    t.textContent='💡 コツ：日本語を隠して最初は聴くだけ。理解度を確認してから日本語をチェックしましょう。';
  }
  generateSentence();
}

function getVoice(){
  if('speechSynthesis'in window){
    const voices=window.speechSynthesis.getVoices();
    
    // 優先度1: Google Wavenet voices（最も自然）
    let voice=voices.find(v=>v.name.includes('Wavenet'));
    if(voice) return voice;
    
    // 優先度2: Google音声
    voice=voices.find(v=>v.name.includes('Google')&&v.lang.startsWith('en-US'));
    if(voice) return voice;
    
    // 優先度3: 英語（US）
    voice=voices.find(v=>v.lang.startsWith('en-US'));
    if(voice) return voice;
    
    // 優先度4: 英語（任意）
    voice=voices.find(v=>v.lang.startsWith('en'));
    if(voice) return voice;
    
    return null;
  }
  return null;
}

function playAudio(){
  if(!isPlaying&&'speechSynthesis'in window){
    playSentence(currentSentence.en);
    if(currentMode==='listening'){
      document.getElementById('japaneseText').style.display='none';
    }
  }
}

function playFavoriteSentence(text){
  if('speechSynthesis'in window){
    playSentence(text);
  }
}

function playSentence(text){
  const u=new SpeechSynthesisUtterance(text);
  u.rate=parseFloat(document.getElementById('speedInput').value)||1;
  u.lang='en-US';
  u.pitch=1;
  u.volume=1;
  
  const voice=getVoice();
  if(voice) u.voice=voice;
  
  isPlaying=true;
  u.onend=()=>{isPlaying=false};
  u.onerror=()=>{isPlaying=false};
  
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function stopAudio(){
  window.speechSynthesis.cancel();
  isPlaying=false;
}

function toggleTranslation(){
  showTranslation=!showTranslation;
  document.getElementById('japaneseText').style.display=showTranslation?'block':'none';
  document.getElementById('jpBtn').textContent=showTranslation?'🇯🇵 非表示':'🇯🇵 表示';
}

function toggleFavorite(){
  const idx=favorites.findIndex(f=>f.en===currentSentence.en);
  if(idx>=0){
    favorites.splice(idx,1);
  }else if(favorites.length<10){
    favorites.push({en:currentSentence.en,jp:currentSentence.jp});
  }
  localStorage.setItem('favorites',JSON.stringify(favorites));
  updateHeartButton();
  updateFavoritesDisplay();
}

function updateHeartButton(){
  const isFavorite=favorites.some(f=>f.en===currentSentence.en);
  const btn=document.getElementById('heartBtn');
  btn.classList.toggle('saved',isFavorite);
  btn.textContent=isFavorite?'❤️':'🤍';
}

function updateFavoritesDisplay(){
  const section=document.getElementById('favoritesSection');
  const list=document.getElementById('favoritesList');
  const count=document.getElementById('favoriteCount');
  
  if(favorites.length===0){
    section.style.display='none';
    return;
  }
  
  section.style.display='block';
  count.textContent=`${favorites.length} / 10`;
  
  list.innerHTML=favorites.map((fav,idx)=>`
    <div class="favorite-item">
      <button class="play-btn" onclick="playFavoriteSentence('${fav.en.replace(/'/g,"\\'")}')">▶️</button>
      <div style="flex:1">
        <div class="en">${fav.en}</div>
        <div class="jp">${fav.jp}</div>
      </div>
      <button class="favorite-btn" onclick="removeFavorite(${idx})">✕</button>
    </div>
  `).join('');
}

function removeFavorite(idx){
  favorites.splice(idx,1);
  localStorage.setItem('favorites',JSON.stringify(favorites));
  updateHeartButton();
  updateFavoritesDisplay();
}

init();
</script>
</body>
</html>
