<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="English shadowing and listening practice app for business English learners">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="English Shadower">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230ea5e9' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>ES</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230ea5e9' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='90' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>ES</text></svg>">
    
    <!-- Manifest -->
    <link rel="manifest" href="data:application/json,{
        %22name%22:%22English Shadower%22,
        %22short_name%22:%22Shadower%22,
        %22description%22:%22Master English shadowing and listening with AI voice guidance%22,
        %22start_url%22:%22/%22,
        %22scope%22:%22/%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%23ffffff%22,
        %22theme_color%22:%220ea5e9%22,
        %22orientation%22:%22portrait-primary%22,
        %22icons%22:[
            {%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230ea5e9' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>ES</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22},
            {%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect fill='%230ea5e9' width='512' height='512'/><text x='50%' y='50%' font-size='280' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>ES</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}
        ],
        %22categories%22:[%22education%22,%22productivity%22],
        %22screenshots%22:[
            {%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 540 720'><rect fill='%23f8fafc' width='540' height='720'/><text x='270' y='360' font-size='60' text-anchor='middle' dominant-baseline='middle' fill='%23334155'>English Shadower</text></svg>%22,%22sizes%22:%22540x720%22,%22type%22:%22image/svg+xml%22,%22form_factor%22:%22narrow%22},
            {%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'><rect fill='%23f8fafc' width='1280' height='720'/><text x='640' y='360' font-size='60' text-anchor='middle' dominant-baseline='middle' fill='%23334155'>English Shadower</text></svg>%22,%22sizes%22:%221280x720%22,%22type%22:%22image/svg+xml%22,%22form_factor%22:%22wide%22}
        ]
    }">
    
    <title>English Shadower - Learn Business English</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1e293b;
            line-height: 1.6;
        }
        html, body, #root {
            width: 100%;
            height: 100%;
        }
        input, textarea, select {
            font-family: inherit;
            font-size: inherit;
        }
        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script async src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script async src="https://cdn.tailwindcss.com"></script>
    <script async src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const { Play, Pause, RotateCcw, Plus, Trash2, Edit2, X, Menu, Home } = window.lucide;

        function EnglishShadowListener() {
          const [mode, setMode] = useState('shadowing');
          const [themes, setThemes] = useState(() => {
            const saved = localStorage.getItem('englishThemes');
            return saved ? JSON.parse(saved) : getDefaultThemes();
          });
          
          const [currentThemeId, setCurrentThemeId] = useState(() => {
            const saved = localStorage.getItem('currentThemeId');
            return saved || 'business-meeting';
          });
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [playbackSpeed, setPlaybackSpeed] = useState(1);
          const [showScript, setShowScript] = useState(true);
          const [showTranslation, setShowTranslation] = useState(false);
          const [isEditing, setIsEditing] = useState(false);
          const [newTheme, setNewTheme] = useState(null);
          const [sidebarOpen, setSidebarOpen] = useState(false);
          const [darkMode, setDarkMode] = useState(() => {
            return localStorage.getItem('darkMode') === 'true';
          });
          
          const currentTheme = themes.find(t => t.id === currentThemeId);

          useEffect(() => {
            localStorage.setItem('englishThemes', JSON.stringify(themes));
          }, [themes]);

          useEffect(() => {
            localStorage.setItem('currentThemeId', currentThemeId);
          }, [currentThemeId]);

          useEffect(() => {
            localStorage.setItem('darkMode', darkMode);
          }, [darkMode]);

          useEffect(() => {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('./sw.js').catch(() => {});
            }
          }, []);

          const speak = (text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.rate = playbackSpeed;
              utterance.lang = 'en-US';
              utterance.pitch = 1;
              window.speechSynthesis.speak(utterance);
              setIsPlaying(true);
              utterance.onend = () => setIsPlaying(false);
            }
          };

          const startShadowing = () => {
            speak(currentTheme.english);
          };

          const stopPlayback = () => {
            window.speechSynthesis.cancel();
            setIsPlaying(false);
          };

          const addTheme = () => {
            if (newTheme && newTheme.title && newTheme.english && newTheme.japanese) {
              const theme = {
                id: `custom-${Date.now()}`,
                title: newTheme.title,
                english: newTheme.english,
                japanese: newTheme.japanese,
                category: newTheme.category || 'Custom',
                isCustom: true
              };
              setThemes([...themes, theme]);
              setNewTheme(null);
              setCurrentThemeId(theme.id);
              setIsEditing(false);
            }
          };

          const deleteTheme = (id) => {
            if (themes.length > 1) {
              setThemes(themes.filter(t => t.id !== id));
              if (currentThemeId === id) {
                setCurrentThemeId(themes.find(t => t.id !== id).id);
              }
            }
          };

          return React.createElement('div', { className: `min-h-screen ${darkMode ? 'bg-slate-900 text-white' : 'bg-white text-slate-900'}` },
            // Header
            React.createElement('header', { className: `sticky top-0 z-40 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'} border-b` },
              React.createElement('div', { className: 'max-w-6xl mx-auto px-4 py-4 flex items-center justify-between' },
                React.createElement('div', { className: 'flex items-center gap-3' },
                  React.createElement('div', { className: 'text-3xl' }, '🎙️'),
                  React.createElement('h1', { className: 'text-2xl font-bold' }, 'English Shadower')
                ),
                React.createElement('div', { className: 'flex items-center gap-2' },
                  React.createElement('button', { onClick: () => setDarkMode(!darkMode), className: `p-2 rounded-lg ${darkMode ? 'bg-slate-700' : 'bg-slate-100'}` }, darkMode ? '☀️' : '🌙'),
                  React.createElement('button', { onClick: () => setSidebarOpen(!sidebarOpen), className: `p-2 rounded-lg ${darkMode ? 'bg-slate-700' : 'bg-slate-100'}` }, '☰')
                )
              ),
              React.createElement('div', { className: `border-t ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-200 bg-slate-50'}` },
                React.createElement('div', { className: 'max-w-6xl mx-auto px-4 py-3 flex gap-3' },
                  React.createElement('button', { onClick: () => setMode('shadowing'), className: `px-4 py-2 rounded-lg font-medium transition ${mode === 'shadowing' ? 'bg-blue-500 text-white' : darkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}` }, '🎙️ Shadowing'),
                  React.createElement('button', { onClick: () => setMode('listening'), className: `px-4 py-2 rounded-lg font-medium transition ${mode === 'listening' ? 'bg-green-500 text-white' : darkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}` }, '👂 Listening')
                )
              )
            ),

            React.createElement('div', { className: 'flex gap-4 max-w-6xl mx-auto' },
              // Main Content
              React.createElement('main', { className: 'flex-1 p-4' },
                currentTheme ? React.createElement('div', { className: 'space-y-6' },
                  React.createElement('div', { className: `p-6 rounded-xl ${darkMode ? 'bg-slate-800' : 'bg-slate-50'}` },
                    React.createElement('p', { className: 'text-sm opacity-75 mb-2' }, currentTheme.category),
                    React.createElement('h2', { className: 'text-3xl font-bold mb-2' }, currentTheme.title)
                  ),
                  React.createElement('div', { className: 'flex flex-wrap gap-3' },
                    React.createElement('button', { onClick: isPlaying ? stopPlayback : startShadowing, className: `flex items-center gap-2 px-6 py-3 rounded-lg font-medium transition ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-500 hover:bg-blue-600'} text-white` },
                      isPlaying ? '⏸️' : '▶️',
                      isPlaying ? 'Stop' : 'Play'
                    ),
                    React.createElement('div', { className: `flex items-center gap-2 px-4 py-3 rounded-lg ${darkMode ? 'bg-slate-800' : 'bg-slate-100'}` },
                      React.createElement('label', { className: 'text-sm font-medium' }, 'Speed:'),
                      React.createElement('select', { value: playbackSpeed, onChange: (e) => setPlaybackSpeed(parseFloat(e.target.value)), className: `px-2 py-1 rounded ${darkMode ? 'bg-slate-700 text-white' : 'bg-white'}` },
                        React.createElement('option', { value: 0.75 }, '0.75x'),
                        React.createElement('option', { value: 1 }, '1.0x'),
                        React.createElement('option', { value: 1.25 }, '1.25x'),
                        React.createElement('option', { value: 1.5 }, '1.5x')
                      )
                    ),
                    React.createElement('button', { onClick: () => setShowScript(!showScript), className: `px-4 py-2 rounded-lg font-medium transition ${showScript ? darkMode ? 'bg-slate-700 text-white' : 'bg-blue-100 text-blue-700' : darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-200 text-slate-600'}` }, showScript ? '👁️ Hide Script' : '👁️ Show Script'),
                    React.createElement('button', { onClick: () => setShowTranslation(!showTranslation), className: `px-4 py-2 rounded-lg font-medium transition ${showTranslation ? darkMode ? 'bg-slate-700 text-white' : 'bg-amber-100 text-amber-700' : darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-200 text-slate-600'}` }, '🇯🇵 ' + (showTranslation ? 'Hide JP' : 'Show JP'))
                  ),
                  showScript && React.createElement('div', { className: `p-6 rounded-xl ${darkMode ? 'bg-slate-800' : 'bg-slate-50'}` },
                    React.createElement('h3', { className: 'text-lg font-semibold mb-4 opacity-75' }, 'English'),
                    React.createElement('p', { className: 'text-2xl leading-relaxed font-medium' }, currentTheme.english)
                  ),
                  showTranslation && React.createElement('div', { className: `p-6 rounded-xl ${darkMode ? 'bg-slate-800' : 'bg-slate-50'}` },
                    React.createElement('h3', { className: 'text-lg font-semibold mb-4 opacity-75' }, '日本語'),
                    React.createElement('p', { className: 'text-xl leading-relaxed' }, currentTheme.japanese)
                  ),
                  React.createElement('div', { className: `p-4 rounded-lg ${darkMode ? 'bg-green-900 text-green-100' : 'bg-green-50 text-green-800'}` },
                    React.createElement('p', { className: 'font-medium' }, '💡 Tip:'),
                    React.createElement('p', { className: 'text-sm mt-1' }, mode === 'shadowing' ? 'Play the audio and try to speak at the same time. Focus on pronunciation and rhythm.' : 'Hide the script and listen first. See how much you understand, then check the text.')
                  )
                ) : React.createElement('div', { className: 'flex items-center justify-center h-96' },
                  React.createElement('p', { className: 'text-xl opacity-50' }, 'No themes available. Add one from the sidebar.')
                )
              ),

              // Sidebar
              React.createElement('aside', { className: `
                fixed right-0 top-0 bottom-0 z-30 w-80 transition-transform duration-300
                ${sidebarOpen ? 'translate-x-0' : 'translate-x-full'}
                lg:static lg:translate-x-0 lg:w-80
                ${darkMode ? 'bg-slate-800' : 'bg-slate-50'}
                border-l ${darkMode ? 'border-slate-700' : 'border-slate-200'}
                overflow-y-auto
              ` },
                React.createElement('div', { className: 'p-4' },
                  React.createElement('div', { className: 'flex items-center justify-between mb-6 lg:hidden' },
                    React.createElement('h3', { className: 'font-bold text-lg' }, 'Themes'),
                    React.createElement('button', { onClick: () => setSidebarOpen(false) }, '✕')
                  ),
                  React.createElement('button', { onClick: () => { setIsEditing(true); setNewTheme({ title: '', english: '', japanese: '', category: '' }); }, className: 'w-full mb-4 flex items-center justify-center gap-2 px-4 py-3 bg-blue-500 text-white rounded-lg font-medium hover:bg-blue-600 transition' },
                    '➕ Add Theme'
                  ),
                  isEditing && React.createElement('div', { className: `p-4 rounded-lg mb-4 ${darkMode ? 'bg-slate-700' : 'bg-white'}` },
                    React.createElement('input', { type: 'text', placeholder: 'Title', value: newTheme?.title || '', onChange: (e) => setNewTheme({ ...newTheme, title: e.target.value }), className: `w-full px-3 py-2 rounded mb-2 ${darkMode ? 'bg-slate-600 text-white' : 'bg-slate-100'}` }),
                    React.createElement('input', { type: 'text', placeholder: 'Category', value: newTheme?.category || '', onChange: (e) => setNewTheme({ ...newTheme, category: e.target.value }), className: `w-full px-3 py-2 rounded mb-2 ${darkMode ? 'bg-slate-600 text-white' : 'bg-slate-100'}` }),
                    React.createElement('textarea', { placeholder: 'English text', value: newTheme?.english || '', onChange: (e) => setNewTheme({ ...newTheme, english: e.target.value }), className: `w-full px-3 py-2 rounded mb-2 h-24 ${darkMode ? 'bg-slate-600 text-white' : 'bg-slate-100'}` }),
                    React.createElement('textarea', { placeholder: '日本語訳', value: newTheme?.japanese || '', onChange: (e) => setNewTheme({ ...newTheme, japanese: e.target.value }), className: `w-full px-3 py-2 rounded mb-3 h-24 ${darkMode ? 'bg-slate-600 text-white' : 'bg-slate-100'}` }),
                    React.createElement('div', { className: 'flex gap-2' },
                      React.createElement('button', { onClick: addTheme, className: 'flex-1 px-3 py-2 bg-green-500 text-white rounded font-medium hover:bg-green-600 transition' }, 'Save'),
                      React.createElement('button', { onClick: () => { setIsEditing(false); setNewTheme(null); }, className: `flex-1 px-3 py-2 rounded font-medium transition ${darkMode ? 'bg-slate-600 hover:bg-slate-500' : 'bg-slate-300 hover:bg-slate-400'}` }, 'Cancel')
                    )
                  ),
                  React.createElement('div', { className: 'space-y-2' },
                    React.createElement('p', { className: 'text-sm font-semibold opacity-75 px-2' }, 'Themes'),
                    themes.map((theme) =>
                      React.createElement('div', { key: theme.id, className: `p-3 rounded-lg cursor-pointer transition ${currentThemeId === theme.id ? darkMode ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-900' : darkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-white hover:bg-slate-100'}` },
                        React.createElement('div', { onClick: () => { setCurrentThemeId(theme.id); setSidebarOpen(false); }, className: 'mb-2' },
                          React.createElement('p', { className: 'font-medium' }, theme.title),
                          React.createElement('p', { className: 'text-xs opacity-75' }, theme.category)
                        ),
                        theme.isCustom && React.createElement('button', { onClick: () => deleteTheme(theme.id), className: 'w-full flex items-center justify-center gap-1 px-2 py-1 text-xs bg-red-500 text-white rounded hover:bg-red-600 transition' },
                          '🗑️ Delete'
                        )
                      )
                    )
                  )
                )
              ),

              // Overlay for mobile
              sidebarOpen && React.createElement('div', { className: 'fixed inset-0 bg-black/50 z-20 lg:hidden', onClick: () => setSidebarOpen(false) })
            )
          );
        }

        function getDefaultThemes() {
          return [
            {
              id: 'business-meeting',
              title: 'Sales Meeting Opening',
              category: 'Business',
              english: 'Good morning, thank you for taking the time to meet with us today. I\'d like to introduce our new seed treatment technology, Gepetto, which has been designed to significantly improve crop yields while reducing the environmental impact of agricultural production.',
              japanese: 'おはようございます。本日はお時間をいただきありがとうございます。当社の新しい種子処理技術、ゲペットをご紹介したいと思います。これは農業生産の環境負荷を軽減しながら、作物の収量を大幅に向上させるために設計されています。',
              isCustom: false
            },
            {
              id: 'presentation',
              title: 'Product Benefits',
              category: 'Sales Pitch',
              english: 'Gepetto offers several key advantages: improved germination rates, enhanced disease resistance, and optimized seed vigor. Our customers have reported yield increases of up to 20% in field trials.',
              japanese: 'ゲペットは以下のような主な利点があります：発芽率の向上、病気への耐性向上、種子活力の最適化です。当社の顧客は試験圃場での収量増加を20%まで報告しています。',
              isCustom: false
            },
            {
              id: 'customer-inquiry',
              title: 'Addressing Customer Concerns',
              category: 'Customer Support',
              english: 'I understand your concern about cost. While the initial investment is higher, the return on investment becomes apparent within the first season due to increased yields and reduced input requirements.',
              japanese: 'コスト面でのご懸念はよく理解しています。初期投資は高いですが、収量の増加と投入量の削減により、最初のシーズンでは投資対効果が明らかになります。',
              isCustom: false
            },
            {
              id: 'technical-discussion',
              title: 'Technical Details',
              category: 'Technical',
              english: 'The active ingredients in Gepetto are derived from naturally occurring biological compounds. The formulation is compatible with existing application equipment and requires no modification to standard farming procedures.',
              japanese: 'ゲペットの有効成分は自然発生的な生物化学物質から由来しています。処方は既存の施用機器と互換性があり、標準的な農業手順に変更は必要ありません。',
              isCustom: false
            },
            {
              id: 'closing',
              title: 'Meeting Closing',
              category: 'Business',
              english: 'Thank you for your attention and your thoughtful questions. We believe Gepetto is an excellent fit for your operation. Would you be interested in a small-scale trial on your property?',
              japanese: 'ご清聴ありがとうございました。貴重なご質問をいただき感謝します。ゲペットはあなたの事業に最適だと確信しています。ご所有の土地での小規模試験にご関心がおありですか？',
              isCustom: false
            }
          ];
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(EnglishShadowListener));
    </script>
</body>
</html>
